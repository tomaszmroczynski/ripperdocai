<!-- @dsCard group="Slides" viewport="1280x720" name="Slide — Big Stat" subtitle="A single capability metric, hero scale." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; }
  .slide { position: relative; width: 1280px; height: 720px; background: var(--ink-900); overflow: hidden; font-family: var(--font-display); padding: 72px 80px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; }
  .glow { position: absolute; width: 620px; height: 620px; left: 40%; top: -160px; background: var(--grad-spark); opacity: 0.4; }
  .content { position: relative; z-index: 2; }
  .eyebrow { font-family: var(--font-mono); font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ember-300); margin-bottom: 22px; }
  .stat { font-size: 240px; line-height: 0.9; letter-spacing: -0.04em; font-weight: 600; background: var(--grad-ember); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .label { font-size: 36px; color: var(--text-strong); margin-top: 20px; letter-spacing: -0.02em; }
  .sub { font-family: var(--font-body); font-size: 19px; color: var(--text-muted); margin-top: 16px; max-width: 640px; line-height: 1.5; }
  .foot { position: absolute; bottom: 64px; left: 80px; display: flex; align-items: center; gap: 12px; z-index: 2; }
  .foot img { width: 26px; height: 26px; color: var(--mist-300); }
  .foot span { font-family: var(--font-mono); font-size: 13px; color: var(--text-faint); letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="slide">
    <div class="glow"></div>
    <div class="content">
      <div class="eyebrow">Measured capability gain</div>
      <div class="stat">+312%</div>
      <div class="label">throughput, per operator</div>
      <p class="sub">One augmented person now reasons over the volume of information that previously required an entire team.</p>
    </div>
    <div class="foot"><img src="../assets/logo/ripperdoc-mark.svg" alt=""><span>RIPPERDOC · CAPABILITY BRIEFING</span></div>
  </div>
</body>
</html>
