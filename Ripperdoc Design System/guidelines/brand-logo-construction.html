<!-- @dsCard group="Brand" viewport="700x250" name="Logo Construction" subtitle="Clear space, minimum size, what not to do." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 28px; }
  .grid { display: grid; grid-template-columns: 1fr 1.4fr; gap: 20px; }
  .panel { background: var(--ink-850); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); padding: 22px; }
  .ttl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 16px; }
  .clear { position: relative; display: inline-flex; padding: 26px; border: 1px dashed var(--border-ember); border-radius: var(--radius-md); }
  .clear img { width: 64px; height: 64px; color: var(--mist-100); }
  .note { font-family: var(--font-body); font-size: 13px; color: var(--text-muted); margin-top: 14px; line-height: 1.5; }
  .note b { color: var(--ember-300); }
  .dont { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .d { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--ink-800); border: 1px solid var(--border-hairline); border-radius: var(--radius-sm); }
  .d .x { width: 18px; height: 18px; border-radius: 50%; background: var(--signal-down-bg); color: var(--signal-down); display: flex; align-items: center; justify-content: center; font-size: 12px; flex: none; }
  .d span { font-size: 12.5px; color: var(--text-muted); }
  .d .mk { width: 34px; height: 34px; flex: none; display: flex; align-items: center; justify-content: center; }
  .d .mk img { width: 30px; height: 30px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel">
      <div class="ttl">Clear space &amp; min size</div>
      <div class="clear" style="color:var(--mist-100)"><img src="../assets/logo/ripperdoc-mark.svg" alt=""></div>
      <p class="note">Keep clear space of <b>one core-node diameter</b> on all sides. Minimum size: <b>20px</b> digital (mark), <b>28px</b> for the badge. Below that, use the mono mark.</p>
    </div>
    <div class="panel">
      <div class="ttl">What not to do</div>
      <div class="dont">
        <div class="d"><div class="x">✕</div><div class="mk" style="color:#7da0c8"><img src="../assets/logo/ripperdoc-mark-mono.svg" alt=""></div><span>Recolor to non-brand hues</span></div>
        <div class="d"><div class="x">✕</div><div class="mk" style="color:var(--mist-100);transform:rotate(28deg)"><img src="../assets/logo/ripperdoc-mark-mono.svg" alt=""></div><span>Rotate or skew the mark</span></div>
        <div class="d"><div class="x">✕</div><div class="mk" style="color:var(--mist-100);transform:scaleX(1.6)"><img src="../assets/logo/ripperdoc-mark-mono.svg" alt=""></div><span>Stretch or distort</span></div>
        <div class="d"><div class="x">✕</div><div class="mk" style="color:var(--mist-300)"><img src="../assets/logo/ripperdoc-mark-mono.svg" alt=""></div><span>Add shadows or outlines</span></div>
      </div>
    </div>
  </div>
</body>
</html>
