<!-- @dsCard group="Brand" viewport="700x300" name="Graphic Motifs" subtitle="The recurring elements derived from the mark." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ink-1000); padding: 26px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .m { position: relative; height: 158px; border-radius: var(--radius-lg); border: 1px solid var(--border-hairline); overflow: hidden; background: var(--ink-850); display: flex; align-items: center; justify-content: center; }
  .m .lab { position: absolute; left: 14px; bottom: 12px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ember-200); z-index: 3; }
  .m img { max-width: 78%; max-height: 78%; }
  /* signal line */
  .sig { width: 80%; height: 2px; background: var(--thread); border-radius: 2px; position: relative; }
  .sig::after { content:""; position: absolute; top: 50%; left: 0; width: 10px; height: 10px; margin-top: -5px; border-radius: 50%; background: var(--spark); box-shadow: var(--glow-spark-core); animation: travel 2.4s var(--ease-in-out) infinite; }
  @keyframes travel { 0%{left:0} 100%{left:100%} }
  .sig .n { position: absolute; top: 50%; width: 7px; height: 7px; margin-top: -3.5px; border-radius: 50%; background: var(--ember-400); }
  .sig .n.a { left: -3px; } .sig .n.b { right: -3px; }
  /* ring */
  .ring { width: 110px; height: 110px; border-radius: 50%; border: 1px solid var(--border-ember); position: relative; }
  .ring::after { content:""; position: absolute; inset: 22px; border-radius: 50%; background: var(--grad-spark); }
  /* spark */
  .spark { width: 120px; height: 120px; background: var(--grad-spark); border-radius: 50%; }
  /* horizon */
  .horizon { width: 100%; height: 100%; background: var(--grad-horizon); }
</style>
</head>
<body>
  <div class="grid">
    <div class="m" style="color:var(--mist-100)"><img src="../assets/motifs/augmentation-arc.svg" alt=""><span class="lab">Augmentation arc</span></div>
    <div class="m"><img src="../assets/motifs/node-lattice.svg" alt=""><span class="lab">Node lattice</span></div>
    <div class="m"><div class="sig"><span class="n a"></span><span class="n b"></span></div><span class="lab">Signal · travelling pulse</span></div>
    <div class="m"><div class="ring"></div><span class="lab">Ring · the frame</span></div>
    <div class="m"><div class="spark"></div><span class="lab">Spark · the focal light</span></div>
    <div class="m" style="padding:0"><div class="horizon"></div><span class="lab">Horizon · cool→warm</span></div>
  </div>
</body>
</html>
