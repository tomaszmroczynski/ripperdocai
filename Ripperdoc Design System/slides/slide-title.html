<!-- @dsCard group="Slides" viewport="1280x720" name="Slide — Title" subtitle="Cover with logomark, lockup, neural field." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; }
  .slide { position: relative; width: 1280px; height: 720px; background: var(--ink-1000); overflow: hidden; font-family: var(--font-display); }
  .slide canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .glow { position: absolute; width: 760px; height: 760px; right: -180px; top: -200px; background: var(--grad-spark); opacity: 0.5; }
  .content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 72px 80px; box-sizing: border-box; }
  .top { display: flex; align-items: center; gap: 14px; }
  .top img { width: 40px; height: 40px; color: var(--mist-100); }
  .top .name { font-size: 22px; font-weight: 600; color: var(--text-strong); letter-spacing: -0.01em; }
  .top .name .doc { color: var(--ember-400); }
  .mid h1 { font-size: 92px; line-height: 1.0; letter-spacing: -0.035em; font-weight: 600; color: var(--paper-50); }
  .mid h1 em { font-style: normal; background: var(--grad-ember); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .mid p { margin-top: 26px; font-size: 22px; color: var(--mist-200); max-width: 720px; font-family: var(--font-body); line-height: 1.5; }
  .bot { display: flex; align-items: center; justify-content: space-between; }
  .lockup { display: flex; align-items: center; gap: 14px; font-weight: 300; font-size: 18px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--mist-300); }
  .lockup .x { color: var(--ember-400); }
  .lockup .c { background: var(--grad-ember); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .bot .meta { font-family: var(--font-mono); font-size: 13px; color: var(--text-faint); letter-spacing: 0.1em; }
</style>
</head>
<body>
  <div class="slide">
    <canvas data-neural-field data-sparks="3" data-density="0.00007" data-speed="0.1"></canvas>
    <div class="glow"></div>
    <div class="content">
      <div class="top"><img src="../assets/logo/ripperdoc-mark.svg" alt=""><span class="name">Ripper<span class="doc">doc</span></span></div>
      <div class="mid">
        <h1>We extend what<br>humans can <em>do</em>.</h1>
        <p>Designing digital augmentations for people, teams and organizations.</p>
      </div>
      <div class="bot">
        <div class="lockup"><span>AI</span><span class="x">×</span><span>SOFTWARE</span><span class="x">×</span><span class="c">HARDWARE</span></div>
        <div class="meta">CAPABILITY BRIEFING · 2026</div>
      </div>
    </div>
  </div>
  <script src="../assets/js/neural-field.js"></script>
</body>
</html>
