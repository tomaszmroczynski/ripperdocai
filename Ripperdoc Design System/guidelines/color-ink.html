<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 26px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 72px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); box-shadow: var(--edge-top); }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: .02em; }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-1000)"></div><span class="name">ink-1000</span><span class="hex">#040506</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><span class="name">ink-900</span><span class="hex">#07090C</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><span class="name">ink-800</span><span class="hex">#11151B</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><span class="name">ink-700</span><span class="hex">#181D25</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><span class="name">ink-600</span><span class="hex">#222932</span></div>
    <div class="sw"><div class="chip" style="background:var(--graphite-500)"></div><span class="name">graphite-500</span><span class="hex">#2E3742</span></div>
    <div class="sw"><div class="chip" style="background:var(--graphite-400)"></div><span class="name">graphite-400</span><span class="hex">#3D4856</span></div>
  </div>
</body>
</html>
