<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ink-1000); }
  .stage { position: relative; height: 240px; overflow: hidden; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .cap { position: absolute; left: 24px; bottom: 20px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ember-300); z-index: 2; }
</style>
</head>
<body>
  <div class="stage">
    <canvas data-neural-field data-sparks="3" data-density="0.00016"></canvas>
    <div class="cap">Intelligence, visualised as movement</div>
  </div>
  <script src="../assets/js/neural-field.js"></script>
</body>
</html>
