<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ripperdoc — Human First. Intelligence Amplified.</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { background: var(--ink-1000); }
  .wrap { max-width: 1240px; margin: 0 auto; padding: 0 40px; }

  /* ---- Nav ---- */
  .nav { position: sticky; top: 0; z-index: 100; backdrop-filter: var(--glass); background: rgba(7,9,12,0.72); border-bottom: 1px solid var(--border-hairline); }
  .nav-in { display: flex; align-items: center; justify-content: space-between; height: 68px; }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand img { width: 30px; height: 30px; color: var(--mist-100); }
  .brand .name { font-family: var(--font-display); font-weight: 600; font-size: 19px; letter-spacing: -0.01em; color: var(--text-strong); }
  .brand .name .doc { color: var(--ember-400); }
  .nav-links { display: flex; gap: 30px; align-items: center; }
  .nav-links a { font-size: 14px; color: var(--text-muted); font-family: var(--font-body); }
  .nav-links a:hover { color: var(--text-strong); }
  .btn { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 18px; border-radius: var(--radius-md); font-family: var(--font-display); font-weight: 600; font-size: 14px; cursor: pointer; border: 1px solid transparent; transition: var(--t-color), var(--t-glow); }
  .btn-primary { background: var(--action-primary); color: var(--text-on-ember); box-shadow: var(--glow-sm); }
  .btn-primary:hover { background: var(--action-primary-hover); box-shadow: var(--glow-md); }
  .btn-ghost { background: transparent; color: var(--text-body); border-color: var(--border-subtle); }
  .btn-ghost:hover { border-color: var(--border-ember); color: var(--text-strong); }

  /* ---- Language switcher ---- */
  .lang { display: flex; gap: 2px; align-items: center; margin-left: 8px; border: 1px solid var(--border-hairline); border-radius: var(--radius-pill); padding: 3px; }
  .lang button { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); background: transparent; border: none; cursor: pointer; padding: 5px 10px; border-radius: var(--radius-pill); transition: var(--t-color); }
  .lang button:hover { color: var(--text-strong); }
  .lang button.active { color: var(--text-on-ember); background: var(--action-primary); }

  /* ---- Hero ---- */
  .hero { position: relative; min-height: 740px; overflow: hidden; display: flex; align-items: center; }
  .hero-bg { position: absolute; inset: 0; }
  .hero-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; }
  .hero-bg::after { content:""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(4,5,6,0.7) 0%, rgba(4,5,6,0.35) 40%, rgba(4,5,6,0.85) 100%); }
  .hero canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 1; }
  .hero-in { position: relative; z-index: 2; padding: 96px 0; max-width: 880px; }
  .eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ember-300); margin-bottom: 26px; padding: 7px 14px; border: 1px solid var(--border-ember); border-radius: var(--radius-pill); background: rgba(234,154,62,0.06); }
  .eyebrow .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--ember-400); box-shadow: var(--glow-sm); }
  h1 { font-size: 76px; line-height: 1.03; letter-spacing: -0.035em; font-weight: 600; color: var(--paper-50); margin-bottom: 26px; }
  h1 em { font-style: normal; background: var(--grad-ember); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lede { font-size: 21px; line-height: 1.55; color: var(--mist-100); max-width: 640px; margin-bottom: 38px; }
  .hero-cta { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .lockup { display: flex; align-items: center; gap: 16px; margin-top: 60px; font-family: var(--font-display); font-weight: 300; font-size: 17px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--mist-300); }
  .lockup .x { color: var(--ember-400); }
  .lockup .c { background: var(--grad-ember); -webkit-background-clip: text; background-clip: text; color: transparent; }

  /* ---- Section frame ---- */
  section.block { padding: 112px 0; border-top: 1px solid var(--border-hairline); }
  .sec-eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ember-300); margin-bottom: 18px; }
  .sec-title { font-size: 46px; line-height: 1.08; letter-spacing: -0.025em; color: var(--text-strong); max-width: 760px; margin-bottom: 22px; }
  .sec-sub { font-size: 18px; color: var(--text-muted); max-width: 640px; line-height: 1.6; }

  /* ---- Manifesto ---- */
  .manifesto { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .manifesto-art { position: relative; border-radius: var(--radius-2xl); overflow: hidden; border: 1px solid var(--border-subtle); background: var(--ink-900); }
  .manifesto-art img { width: 100%; height: auto; display: block; }
  .manifesto-art .scrim { position: absolute; inset: 0; background: var(--grad-scrim); }
  .manifesto-art .tag { position: absolute; left: 26px; bottom: 24px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ember-200); }
  .quote { font-size: 30px; line-height: 1.36; letter-spacing: -0.02em; color: var(--paper-50); font-weight: 400; }
  .quote em { font-style: normal; color: var(--ember-300); }
  .manifesto p.body { margin-top: 24px; font-size: 16px; line-height: 1.72; color: var(--text-muted); }

  /* ---- Pillars (services) ---- */
  .pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-top: 60px; }
  .pillar { position: relative; background: var(--surface-card); background-image: var(--grad-card); border: 1px solid var(--border-hairline); border-radius: var(--radius-xl); padding: 34px; transition: border-color var(--dur-base) var(--ease-signal), transform var(--dur-base) var(--ease-signal); }
  .pillar:hover { border-color: var(--border-ember); transform: translateY(-3px); }
  .pillar .ic { width: 52px; height: 52px; border-radius: var(--radius-md); background: var(--ink-700); border: 1px solid var(--border-hairline); display: flex; align-items: center; justify-content: center; margin-bottom: 22px; box-shadow: var(--edge-top); }
  .pillar .ic svg { width: 24px; height: 24px; color: var(--ember-300); stroke-width: 1.5; }
  .pillar h3 { font-size: 22px; margin-bottom: 12px; color: var(--text-strong); }
  .pillar p { font-size: 15px; color: var(--text-muted); line-height: 1.62; }
  .pillar .meta { margin-top: 22px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--text-faint); display: flex; align-items: center; gap: 8px; }

  /* ---- Atlas ---- */
  .atlas { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 64px; align-items: center; }
  .atlas-panel { position: relative; border-radius: var(--radius-2xl); overflow: hidden; border: 1px solid var(--border-subtle); background: radial-gradient(120% 90% at 50% 35%, rgba(234,154,62,0.07), rgba(7,9,12,0) 60%), var(--ink-900); aspect-ratio: 16/12; }
  .atlas-panel .badge { position: absolute; top: 20px; left: 20px; z-index: 3; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ember-200); border: 1px solid var(--border-ember); border-radius: var(--radius-pill); padding: 6px 12px; background: rgba(234,154,62,0.06); pointer-events: none; }
  a.scan-preview { display: block; text-decoration: none; cursor: pointer; transition: border-color var(--dur-base) var(--ease-signal), transform var(--dur-base) var(--ease-signal), box-shadow var(--dur-base) var(--ease-signal); }
  a.scan-preview:hover { border-color: var(--border-ember); transform: translateY(-3px); box-shadow: var(--glow-md); }
  .scan-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .scan-sweep { animation: scan-move 3.6s var(--ease-signal) infinite; }
  @keyframes scan-move { 0% { transform: translateY(0); } 50% { transform: translateY(196px); } 100% { transform: translateY(0); } }
  .spark-node { transform-origin: 160px 92px; animation: spark-breath 2.4s ease-in-out infinite; }
  @keyframes spark-breath { 0%,100% { opacity: 0.35; } 50% { opacity: 0.95; } }
  .scan-cta { position: absolute; left: 0; right: 0; bottom: 0; z-index: 3; display: flex; align-items: center; justify-content: center; gap: 9px; padding: 16px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); background: linear-gradient(180deg, rgba(7,9,12,0) 0%, rgba(7,9,12,0.85) 100%); transition: color var(--dur-base) var(--ease-signal); }
  .scan-cta i { color: var(--ember-300); width: 16px; height: 16px; }
  a.scan-preview:hover .scan-cta { color: var(--text-strong); }
  @media (prefers-reduced-motion: reduce) { .scan-sweep, .spark-node { animation: none; } }
  .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
  .chip { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; color: var(--text-muted); border: 1px solid var(--border-hairline); border-radius: var(--radius-pill); padding: 8px 14px; background: var(--surface-card); }
  .chip i { color: var(--ember-300); width: 15px; height: 15px; }
  .work-meta { margin-top: 22px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.03em; color: var(--text-faint); line-height: 1.7; }

  /* ---- Proof / stats ---- */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-top: 56px; }
  .stat { background: var(--surface-card); background-image: var(--grad-card); border: 1px solid var(--border-hairline); border-radius: var(--radius-xl); padding: 32px; }
  .stat .v { font-family: var(--font-display); font-size: 44px; font-weight: 600; letter-spacing: -0.03em; background: var(--grad-ember); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .stat .l { margin-top: 8px; font-size: 15px; color: var(--text-muted); }

  /* ---- Closing CTA ---- */
  .cta { position: relative; text-align: center; border-radius: var(--radius-2xl); overflow: hidden; border: 1px solid var(--border-subtle); padding: 92px 40px; background: var(--ink-900); }
  .cta canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .cta-in { position: relative; z-index: 2; }
  .cta h2 { font-size: 50px; letter-spacing: -0.03em; color: var(--paper-50); margin-bottom: 18px; }
  .cta p { font-size: 18px; color: var(--text-muted); margin-bottom: 34px; max-width: 680px; margin-left: auto; margin-right: auto; line-height: 1.6; }

  /* ---- Footer ---- */
  footer { border-top: 1px solid var(--border-hairline); padding: 44px 0; }
  .foot-in { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .foot-in .copy { font-size: 13px; color: var(--text-faint); font-family: var(--font-mono); }
  i[data-lucide] { width: 1em; height: 1em; }

  @media (max-width: 880px) {
    h1 { font-size: 52px; }
    .manifesto, .atlas { grid-template-columns: 1fr; gap: 40px; }
    .pillars, .stats { grid-template-columns: 1fr; }
    .nav-links a { display: none; }
  }
</style>
</head>

        "hero.cta1":"Start en augmentasjon","hero.cta2":"Les manifestet",
        "manifesto.tag":"Menneske + intelligens","manifesto.eyebrow":"Manifestet","manifesto.lead":"I Cyberpunk-universet helbredet ripperdocen ikke bare — han forsterket mennesket. Han satte inn øyne som så mer, styrket reflekser og hukommelse, og åpnet veien forbi biologiske grenser. Han var porten til å overskride sine egne begrensninger.",

    function setLang(lang) {
      const dict = I18N[lang];
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = dict[el.getAttribute('data-i18n')]; if (v != null) el.textContent = v;
      });
      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const v = dict[el.getAttribute('data-i18n-html')]; if (v != null) el.innerHTML = v;
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const v = dict[el.getAttribute('data-i18n-ph')]; if (v != null) el.setAttribute('placeholder', v);
      });
      document.querySelectorAll('#lang button').forEach(b =>
        b.classList.toggle('active', b.getAttribute('data-lang') === lang));
      const sl = document.getElementById('scan-link');
      if (sl) sl.setAttribute('href', 'bio-scan-3d.html?lang=' + lang);
    }
    document.getElementById('lang').addEventListener('click', e => {
      const b = e.target.closest('button'); if (b) setLang(b.getAttribute('data-lang'));
    });
    setLang('no');
    lucide.createIcons();
