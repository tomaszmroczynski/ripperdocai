<!-- @dsCard group="Type" viewport="700x200" name="Mono — Signals" subtitle="Geist Mono for data, labels, telemetry, code." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 30px; font-family: var(--font-mono); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .lbl { font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ember-300); }
  .big { font-size: 13px; color: var(--text-muted); margin-top: 10px; line-height: 1.9; }
  .big .k { color: var(--text-faint); }
  .big .v { color: var(--text-strong); }
  .stat { font-size: 40px; font-weight: 500; color: var(--text-strong); letter-spacing: -0.02em; }
  .delta { font-size: 13px; color: var(--signal-up); }
</style>
</head>
<body>
  <div class="grid">
    <div>
      <div class="lbl">Telemetry</div>
      <div class="big"><span class="k">latency</span> &nbsp;<span class="v">142ms</span><br><span class="k">tokens/s</span> <span class="v">3,480</span><br><span class="k">status</span> &nbsp;&nbsp;<span class="v">active</span></div>
    </div>
    <div>
      <div class="lbl">Capability gained</div>
      <div class="stat">+312%</div>
      <div class="delta">▲ throughput vs. baseline</div>
    </div>
  </div>
</body>
</html>
