<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 30px; }
  .row { display: flex; gap: 22px; }
  .u { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .card { width: 130px; height: 84px; background: var(--surface-card); border-radius: var(--radius-lg); border: 1px solid var(--border-hairline); }
  .u b { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="card" style="box-shadow:var(--edge-top), var(--shadow-sm)"></div><b>card / sm</b></div>
    <div class="u"><div class="card" style="box-shadow:var(--elevate-card)"></div><b>pop / md</b></div>
    <div class="u"><div class="card" style="box-shadow:var(--elevate-pop)"></div><b>lg</b></div>
    <div class="u"><div class="card" style="box-shadow:var(--elevate-modal)"></div><b>modal / xl</b></div>
  </div>
</body>
</html>
