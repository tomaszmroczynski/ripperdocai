<!-- @dsCard group="Brand" viewport="700x440" name="Logo System" subtitle="Primary mark, badge, lockups, monochrome." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 30px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .panel { background: var(--ink-850); border: 1px solid var(--border-hairline); border-radius: var(--radius-lg); padding: 24px; }
  .panel.full { grid-column: 1 / -1; }
  .ttl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 18px; }
  .lockup-h { display: flex; align-items: center; gap: 16px; }
  .lockup-h img { width: 48px; height: 48px; color: var(--mist-100); }
  .word { font-family: var(--font-display); font-weight: 600; font-size: 30px; letter-spacing: -0.02em; color: var(--text-strong); line-height: 1; }
  .word .doc { color: var(--ember-400); }
  .tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-top: 5px; }
  .lockup-v { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .lockup-v img { width: 52px; height: 52px; color: var(--mist-100); }
  .row { display: flex; align-items: center; gap: 28px; }
  .chip { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .chip .sq { width: 92px; height: 92px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-hairline); }
  .chip .sq img { width: 58px; height: 58px; }
  .chip span { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .on-ink { background: var(--ink-1000); color: var(--mist-100); }
  .on-paper { background: var(--paper-50); color: var(--ink-900); }
  .on-ember { background: var(--ember-500); color: var(--ink-1000); }
  .sizes { display: flex; align-items: flex-end; gap: 22px; }
  .sizes .s { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--mist-100); }
  .sizes .s span { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel">
      <div class="ttl">Primary mark — rising augmentation</div>
      <div class="row" style="justify-content:center;color:var(--mist-100)">
        <img src="../assets/logo/ripperdoc-mark.svg" alt="" style="width:96px;height:96px">
      </div>
    </div>
    <div class="panel">
      <div class="ttl">Badge — contained / app icon</div>
      <div class="row" style="justify-content:center;color:var(--mist-100)">
        <img src="../assets/logo/ripperdoc-badge.svg" alt="" style="width:96px;height:96px">
      </div>
    </div>

    <div class="panel">
      <div class="ttl">Horizontal lockup</div>
      <div class="lockup-h">
        <img src="../assets/logo/ripperdoc-mark.svg" alt="">
        <div><div class="word">Ripper<span class="doc">doc</span></div><div class="tag">Human first · Intelligence amplified</div></div>
      </div>
    </div>
    <div class="panel">
      <div class="ttl">Stacked lockup</div>
      <div class="lockup-v">
        <img src="../assets/logo/ripperdoc-mark.svg" alt="">
        <div class="word">Ripper<span class="doc">doc</span></div>
      </div>
    </div>

    <div class="panel full">
      <div class="ttl">Surface tests &amp; monochrome</div>
      <div class="row" style="justify-content:space-between">
        <div class="chip"><div class="sq on-ink"><img src="../assets/logo/ripperdoc-mark.svg" alt=""></div><span>on ink</span></div>
        <div class="chip"><div class="sq on-paper"><img src="../assets/logo/ripperdoc-mark.svg" alt=""></div><span>on paper</span></div>
        <div class="chip"><div class="sq on-ember" style="color:var(--ink-1000)"><img src="../assets/logo/ripperdoc-mark-mono.svg" alt=""></div><span>on ember · mono</span></div>
        <div class="sizes">
          <div class="s"><img src="../assets/logo/ripperdoc-mark-mono.svg" style="width:44px;height:44px"><span>44</span></div>
          <div class="s"><img src="../assets/logo/ripperdoc-mark-mono.svg" style="width:28px;height:28px"><span>28</span></div>
          <div class="s"><img src="../assets/logo/ripperdoc-mark-mono.svg" style="width:18px;height:18px"><span>18 · mono</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
