<!-- @dsCard group="Atlas Dashboard" viewport="1320x880" name="Atlas — Augmentation Console" subtitle="Overview & agents. Interactive nav." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas — Augmentation Console</title>
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../../assets/js/neural-field.js"></script>
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg-base); }
  #app { height: 100vh; display: flex; overflow: hidden; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .canvas-area { flex: 1; overflow-y: auto; padding: 26px; }
  .view-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
</style>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Topbar.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" data-presets="react">
    (() => {
    const { Tabs } = window.RipperdocDesignSystem_cbf3c1;

    const META = {
      overview: { title: 'Overview', sub: 'workspace · ripperdoc-labs' },
      agents: { title: 'Agents', sub: '6 deployed · 4 active' },
      knowledge: { title: 'Knowledge', sub: 'workspace · ripperdoc-labs' },
      automations: { title: 'Automations', sub: 'workspace · ripperdoc-labs' },
      signals: { title: 'Signals', sub: 'live telemetry' },
      people: { title: 'People', sub: '12 operators' },
      settings: { title: 'Settings', sub: 'workspace · ripperdoc-labs' },
    };

    function Placeholder({ id }) {
      const Ic = ({ n }) => <i data-lucide={n} style={{ width: 26, height: 26 }}></i>;
      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '60%', gap: 14, color: 'var(--text-faint)' }}>
          <span style={{ color: 'var(--ember-300)' }}><Ic n="orbit" /></span>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 18, color: 'var(--text-muted)' }}>{META[id].title} surface</div>
          <div style={{ fontSize: 13 }}>This view is part of the Atlas kit — wire it to your data.</div>
        </div>
      );
    }

    function App() {
      const [nav, setNav] = React.useState('overview');
      const meta = META[nav] || META.overview;

      React.useEffect(() => {
        const t = setTimeout(() => window.lucide && window.lucide.createIcons(), 40);
        return () => clearTimeout(t);
      }, [nav]);

      let view;
      if (nav === 'overview') view = <window.OverviewScreen />;
      else if (nav === 'agents') view = <window.AgentsScreen />;
      else view = <Placeholder id={nav} />;

      return (
        <React.Fragment>
          <window.Sidebar active={nav} onNav={setNav} />
          <div className="main">
            <window.Topbar title={meta.title} subtitle={meta.sub} />
            <div className="canvas-area">
              {nav === 'agents' && (
                <div className="view-head">
                  <Tabs items={[
                    { id: 'all', label: 'All agents', count: 6 },
                    { id: 'active', label: 'Active', count: 4 },
                    { id: 'paused', label: 'Paused', count: 1 },
                  ]} />
                </div>
              )}
              {view}
            </div>
          </div>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 120);
    })();
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>setTimeout(() => window.lucide && lucide.createIcons(), 200);</script>
</body>
</html>
