<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RipperSync — Bio-Scan</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink-900:#07090C; --mist-300:#828D9C; --mist-100:#D2D8E0; --paper-50:#EEF1F5;
    --ember-300:#F1B86A; --ember-400:#EA9A3E; --ember-500:#DD7E27; --spark:#FFD9A0;
    --border-hairline:rgba(255,255,255,.07); --border-ember:rgba(234,154,62,.42);
    --glass:rgba(7,9,12,.62); --ease-signal:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink-900);color:var(--paper-50);font-family:"Geist",system-ui,sans-serif}
  #app{position:fixed;inset:0}
  .eyebrow{position:fixed;top:16px;left:18px;z-index:6;font-family:"Geist Mono",monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mist-300);display:flex;align-items:center;gap:8px}
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--ember-400);box-shadow:0 0 10px var(--ember-400)}
  .help{position:fixed;bottom:14px;left:0;right:0;text-align:center;z-index:6;pointer-events:none;font-family:"Geist Mono",monospace;font-size:9px;letter-spacing:.16em;color:var(--mist-300);text-transform:uppercase}
  .help b{color:var(--ember-300);font-weight:400}

  .panel{position:fixed;z-index:8;width:min(290px,82vw);background:var(--glass);
    -webkit-backdrop-filter:saturate(140%) blur(14px);backdrop-filter:saturate(140%) blur(14px);
    border:1px solid var(--border-ember);border-radius:16px;padding:16px 18px;
    box-shadow:0 30px 80px -40px rgba(0,0,0,.85);opacity:0;transform:translateY(8px);pointer-events:none;
    transition:opacity .28s var(--ease-signal),transform .28s var(--ease-signal)}
  .panel.on{opacity:1;transform:translateY(0)}
  .panel .px{position:absolute;top:8px;right:10px;font-size:18px;line-height:1;color:var(--mist-300);cursor:pointer;display:none}
  .p-eyebrow{font-family:"Geist Mono",monospace;font-size:9px;letter-spacing:.22em;color:var(--mist-300);text-transform:uppercase;display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .p-eyebrow::before{content:"";width:14px;height:1px;background:var(--ember-400)}
  /* coach */
  .coach .hd{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .coach .ring{width:30px;height:30px;border-radius:50%;border:1px solid var(--border-ember);position:relative;flex:none}
  .coach .ring::after{content:"";position:absolute;inset:0;margin:auto;width:9px;height:9px;border-radius:50%;background:radial-gradient(circle,#FFD9A0,#EA9A3E);box-shadow:0 0 12px rgba(255,217,160,.65);animation:breath 4s var(--ease-signal) infinite}
  @keyframes breath{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
  .coach .who{font-size:12px;font-weight:500}
  .coach .who span{display:block;font-family:"Geist Mono",monospace;font-size:8.5px;letter-spacing:.18em;color:var(--mist-300);text-transform:uppercase;margin-top:2px}
  .coach p{font-size:13px;line-height:1.6;color:var(--mist-100)}
  .coach p b{color:var(--ember-200,#F6D29A);font-weight:500}
  /* vitals */
  .vital{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--border-hairline)}
  .vital:last-child{border-bottom:0}
  .vital .meta{display:flex;flex-direction:column;gap:2px}
  .vital .k{font-family:"Geist Mono",monospace;font-size:8.5px;letter-spacing:.12em;color:var(--mist-300);text-transform:uppercase}
  .vital .v{font-family:"Geist Mono",monospace;font-size:17px;font-weight:500;color:var(--paper-50)}
  .vital .v small{font-size:9.5px;color:var(--mist-300);font-weight:400}
  .vital svg{width:78px;height:26px;flex:none}
  .vital svg polyline{fill:none;stroke:var(--ember-400);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
  .vital svg circle{fill:var(--spark)}

  body.embed .eyebrow, body.embed .help{display:none}
  #err{position:fixed;top:0;left:0;right:0;z-index:99;background:#20100c;color:#F6D29A;font:12px monospace;padding:8px;white-space:pre-wrap;display:none}
</style>
</head>
<body>
<div id="err"></div>
<div id="app"></div>
<div class="eyebrow"><span class="dot"></span><span id="eb">RipperSync · Bio-scan</span></div>
<div class="help" id="help"></div>

<div class="panel coach" id="coachPanel">
  <span class="px" data-close>×</span>
  <div class="p-eyebrow" id="coachEy">Coach</div>
  <div class="hd"><div class="ring"></div><div class="who" id="coachWho"></div></div>
  <p id="coachMsg"></p>
</div>
<div class="panel vitals" id="vitalsPanel">
  <span class="px" data-close>×</span>
  <div class="p-eyebrow" id="vitalsEy">Telemetry</div>
  <div id="vitalsList"></div>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const I18N = {
  no: { eb:'RipperSync · Bio-scan', helpHover:'Hold over <b>hodet</b> (coach) eller <b>hjertet</b> (avlesninger)', helpTap:'Trykk på <b>hodet</b> eller <b>hjertet</b>',
    coachEy:'Coach', coachWho:'Ripperdoc<span>KI-coach</span>', coachMsg:'Hvilepulsen din har falt <b>tre dager på rad</b>, og restitusjonen stiger. Kroppen er klar for mer enn du gir den i dag.',
    vitalsEy:'Telemetri · 7 dager', vitals:[['Handlekraft','84','/100'],['Hvilepuls','62','bpm'],['HRV','78','ms'],['Søvn','7:23','t']] },
  en: { eb:'RipperSync · Bio-scan', helpHover:'Hover the <b>head</b> (coach) or the <b>heart</b> (readings)', helpTap:'Tap the <b>head</b> or the <b>heart</b>',
    coachEy:'Coach', coachWho:'Ripperdoc<span>AI coach</span>', coachMsg:'Your resting heart rate has dropped <b>three days running</b>, and recovery is climbing. Your body is ready for more than you’re giving it today.',
    vitalsEy:'Telemetry · 7 days', vitals:[['Readiness','84','/100'],['Resting HR','62','bpm'],['HRV','78','ms'],['Sleep','7:23','h']] },
  pl: { eb:'RipperSync · Bio-skan', helpHover:'Najedź na <b>głowę</b> (coach) lub <b>serce</b> (odczyty)', helpTap:'Dotknij <b>głowy</b> lub <b>serca</b>',
    coachEy:'Coach', coachWho:'Ripperdoc<span>AI coach</span>', coachMsg:'Twoje tętno spoczynkowe spada <b>trzeci dzień z rzędu</b>, a regeneracja rośnie. Ciało jest gotowe na więcej, niż mu dziś dajesz.',
    vitalsEy:'Telemetria · 7 dni', vitals:[['Gotowość','84','/100'],['Tętno spocz.','62','bpm'],['HRV','78','ms'],['Sen','7:23','h']] }
};
const SPARKS=[[70,72,74,75,79,82,84],[68,67,66,65,64,63,62],[62,64,67,70,73,76,78],[6.5,7.0,6.8,7.2,7.4,7.1,7.4]];
const params=new URLSearchParams(location.search); let lang=params.get('lang'); if(!I18N[lang]) lang='no';
if(params.get('embed')) document.body.classList.add('embed');
const T=I18N[lang]; document.documentElement.lang=lang;
const hasHover=matchMedia('(hover: hover)').matches;
document.getElementById('eb').textContent=T.eb;
document.getElementById('help').innerHTML=hasHover?T.helpHover:T.helpTap;
document.getElementById('coachEy').textContent=T.coachEy;
document.getElementById('coachWho').innerHTML=T.coachWho;
document.getElementById('coachMsg').innerHTML=T.coachMsg;
document.getElementById('vitalsEy').textContent=T.vitalsEy;
function sparkSVG(arr){ const w=78,h=26,p=3,mn=Math.min(...arr),mx=Math.max(...arr),rg=(mx-mn)||1;
  const pts=arr.map((v,i)=>{const x=p+i*(w-2*p)/(arr.length-1); const y=h-p-((v-mn)/rg)*(h-2*p); return x.toFixed(1)+','+y.toFixed(1);}).join(' ');
  const last=pts.split(' ').pop().split(','); return `<svg viewBox="0 0 ${w} ${h}"><polyline points="${pts}"/><circle cx="${last[0]}" cy="${last[1]}" r="2"/></svg>`; }
document.getElementById('vitalsList').innerHTML = T.vitals.map((v,i)=>
  `<div class="vital"><div class="meta"><span class="k">${v[0]}</span><span class="v">${v[1]}<small> ${v[2]}</small></span></div>${sparkSVG(SPARKS[i])}</div>`).join('');

const err=document.getElementById('err'); function fail(m){err.style.display='block';err.textContent='⚠ '+m;}
window.addEventListener('error',e=>fail(e.message||'error'));

const BG=0x07090C;
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(BG,0.07);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.05,100); camera.position.set(0,0.7,3.2);
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true}); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight); renderer.setClearColor(0x07090C,1);
document.getElementById('app').appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.enablePan=false;
controls.minDistance=2.0; controls.maxDistance=5; controls.target.set(0,0.72,0); controls.autoRotate=true; controls.autoRotateSpeed=0.45;

function sprite(){const c=document.createElement('canvas');c.width=c.height=64;const g=c.getContext('2d');
  const gr=g.createRadialGradient(32,32,0,32,32,32);gr.addColorStop(0,'rgba(255,255,255,1)');gr.addColorStop(.3,'rgba(255,255,255,.6)');gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr;g.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const TEX=sprite();

const figure=new THREE.Group(); scene.add(figure);
fetch('/assets/data/body.json').then(r=>r.json()).then(flat=>{
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(flat),3));
  const m=new THREE.PointsMaterial({size:0.022,map:TEX,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,color:0xF1B86A,opacity:0.9,sizeAttenuation:true});
  figure.add(new THREE.Points(g,m));
}).catch(e=>fail('body.json: '+e.message));

// hotspots: head + heart
const HOT={ head:new THREE.Vector3(0,1.6,0.12), heart:new THREE.Vector3(-0.04,1.06,0.17) };
const markers={}, hits=[], pick=[];
for(const key of ['head','heart']){
  const grp=new THREE.Group(); grp.position.copy(HOT[key]);
  const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:TEX,color:0xFFD9A0,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,opacity:0.6}));
  glow.scale.setScalar(key==='head'?0.34:0.3); grp.add(glow);
  const core=new THREE.Mesh(new THREE.SphereGeometry(0.025,16,16),new THREE.MeshBasicMaterial({color:0xFFF3DF})); grp.add(core);
  figure.add(grp); markers[key]={grp,glow};
  const hit=new THREE.Mesh(new THREE.SphereGeometry(key==='head'?0.2:0.16,12,12),new THREE.MeshBasicMaterial({visible:false}));
  hit.position.copy(HOT[key]); hit.userData.k=key; figure.add(hit); pick.push(hit);
}

const coachPanel=document.getElementById('coachPanel'), vitalsPanel=document.getElementById('vitalsPanel');
let active=null;
function place(panel,anchor,side){
  const v=anchor.clone(); figure.localToWorld(v); v.project(camera);
  const x=(v.x*0.5+0.5)*innerWidth, y=(-v.y*0.5+0.5)*innerHeight;
  const w=panel.offsetWidth||280, off=46;
  let left = side<0 ? x-off-w : x+off; left=Math.max(10,Math.min(innerWidth-w-10,left));
  let top = Math.max(10,Math.min(innerHeight- (panel.offsetHeight||160) -10, y-40));
  panel.style.left=left+'px'; panel.style.top=top+'px';
}
function setActive(k){
  active=k;
  coachPanel.classList.toggle('on',k==='head');
  vitalsPanel.classList.toggle('on',k==='heart');
}
const ray=new THREE.Raycaster(), ptr=new THREE.Vector2();
function hitTest(e){ ptr.x=(e.clientX/innerWidth)*2-1; ptr.y=-(e.clientY/innerHeight)*2+1; ray.setFromCamera(ptr,camera);
  const h=ray.intersectObjects(pick,false); return h.length?h[0].object.userData.k:null; }
let pinned=false;
document.querySelectorAll('.panel .px').forEach(x=>{ x.style.display='block'; x.addEventListener('click',()=>{ pinned=false; setActive(null); }); });
if(hasHover){
  renderer.domElement.addEventListener('pointermove',e=>{ if(pinned) return; const k=hitTest(e); if(k!==active) setActive(k); });
  renderer.domElement.addEventListener('pointerleave',()=>{ if(!pinned) setActive(null); });
  renderer.domElement.addEventListener('click',e=>{ const k=hitTest(e); if(k){ pinned=true; setActive(k); } else if(pinned){ pinned=false; setActive(null); } });
} else {
  renderer.domElement.addEventListener('pointerdown',e=>{ const k=hitTest(e); pinned=!!k; setActive(k===active?null:k); });
}

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
const clock=new THREE.Clock();
renderer.setAnimationLoop(()=>{
  const t=clock.getElapsedTime();
  for(const key of ['head','heart']){ const m=markers[key]; const on=(active===key);
    const base=key==='head'?0.34:0.3; const pul=0.5+0.5*Math.sin(t*(key==='heart'?5:2));
    m.glow.scale.setScalar(base*(on?1.6:1)+pul*0.1); m.glow.material.opacity=(on?0.95:0.55)+pul*0.05;
  }
  controls.autoRotate = !active;
  controls.update();
  if(active==='head') place(coachPanel,HOT.head,-1);
  if(active==='heart') place(vitalsPanel,HOT.heart,1);
  renderer.render(scene,camera);
});
</script>
</body>
</html>
