<!-- @dsCard group="Brand" viewport="700x210" name="Iconography Principles" subtitle="Lucide, 1.5 stroke, ember in a well." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 26px; }
  .row { display: grid; grid-template-columns: auto 1fr; gap: 30px; align-items: center; }
  .specimens { display: flex; align-items: flex-end; gap: 20px; }
  .well { background: var(--ink-700); border: 1px solid var(--border-hairline); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; box-shadow: var(--edge-top); }
  .well svg { color: var(--ember-300); stroke-width: 1.5; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .col span { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .rules { display: flex; flex-direction: column; gap: 9px; }
  .rule { display: flex; gap: 10px; font-size: 13.5px; color: var(--text-muted); line-height: 1.45; }
  .rule .k { color: var(--ember-300); font-family: var(--font-mono); flex: none; }
  .rule b { color: var(--text-body); font-weight: 500; }
  i[data-lucide] { width: 1em; height: 1em; }
</style>
</head>
<body>
  <div class="row">
    <div class="specimens">
      <div class="col"><div class="well" style="width:64px;height:64px"><i data-lucide="waypoints" style="width:30px;height:30px"></i></div><span>48 · header</span></div>
      <div class="col"><div class="well" style="width:48px;height:48px"><i data-lucide="brain" style="width:22px;height:22px"></i></div><span>24 · body</span></div>
      <div class="col"><div class="well" style="width:36px;height:36px"><i data-lucide="activity" style="width:17px;height:17px"></i></div><span>18 · inline</span></div>
    </div>
    <div class="rules">
      <div class="rule"><span class="k">→</span><span><b>Lucide</b>, thin-line, 1.5 stroke. Architectural and systematic.</span></div>
      <div class="rule"><span class="k">→</span><span>Render in <b>ember-300</b> inside an ink well, or muted grey when inert.</span></div>
      <div class="rule"><span class="k">→</span><span><b>Never filled, never multi-colour</b>, never emoji. Outline only.</span></div>
      <div class="rule"><span class="k">→</span><span>Favour metaphors of <b>connection &amp; augmentation</b> over generic AI glyphs.</span></div>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
