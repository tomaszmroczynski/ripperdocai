<!-- @dsCard group="Slides" viewport="1280x720" name="Slide — Manifesto Quote" subtitle="Split image + large quote." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { margin:0; }
  .slide { position: relative; width: 1280px; height: 720px; background: var(--ink-1000); overflow: hidden; font-family: var(--font-display); display: grid; grid-template-columns: 1fr 1fr; }
  .art { position: relative; }
  .art img { width: 100%; height: 100%; object-fit: cover; }
  .art::after { content:""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(4,5,6,0) 60%, var(--ink-1000) 100%); }
  .copy { padding: 80px 72px; display: flex; flex-direction: column; justify-content: center; }
  .eyebrow { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ember-300); margin-bottom: 28px; }
  .quote { font-size: 42px; line-height: 1.28; letter-spacing: -0.02em; color: var(--paper-50); font-weight: 400; }
  .quote em { font-style: normal; color: var(--ember-300); }
  .by { margin-top: 36px; display: flex; align-items: center; gap: 14px; }
  .by .bar { width: 30px; height: 1px; background: var(--border-ember); }
  .by span { font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="slide">
    <div class="art"><img src="../assets/img/portrait-neural.jpg" alt=""></div>
    <div class="copy">
      <div class="eyebrow">The manifesto</div>
      <p class="quote">If implants enhanced the body, <em>intelligence enhances the mind.</em></p>
      <div class="by"><span class="bar"></span><span>Ripperdoc — human capability, augmented</span></div>
    </div>
  </div>
</body>
</html>
