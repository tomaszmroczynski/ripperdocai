<!-- @dsCard group="Type" viewport="700x300" name="Type Scale" subtitle="1.25 ratio — 11px signals up to 112px display." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 28px; }
  .r { display: flex; align-items: baseline; gap: 18px; padding: 5px 0; border-bottom: 1px solid var(--border-hairline); }
  .r:last-child { border: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 86px; flex: none; }
  .spec { font-family: var(--font-display); color: var(--text-strong); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.02em; }
</style>
</head>
<body>
  <div class="r"><span class="tag">5xl · 64</span><span class="spec" style="font-size:42px;font-weight:600">Capability</span></div>
  <div class="r"><span class="tag">3xl · 36</span><span class="spec" style="font-size:32px;font-weight:600">Augmentation</span></div>
  <div class="r"><span class="tag">2xl · 28</span><span class="spec" style="font-size:26px;font-weight:500">Intelligent systems</span></div>
  <div class="r"><span class="tag">xl · 22</span><span class="spec" style="font-size:21px;font-weight:500">Human in the centre</span></div>
  <div class="r"><span class="tag">lg · 18</span><span class="spec" style="font-size:18px;font-weight:400">We extend what humans can do</span></div>
  <div class="r"><span class="tag">base · 16</span><span class="spec" style="font-size:16px;font-weight:400;color:var(--text-body)">Body copy for reading at length and ease</span></div>
  <div class="r"><span class="tag">sm · 14</span><span class="spec" style="font-size:14px;font-weight:400;color:var(--text-muted)">Secondary and supporting text</span></div>
</body>
</html>
