<!-- @dsCard group="Spacing" viewport="700x200" name="Neural Glow" subtitle="Ember glow marks active intelligence — focus, signal, spark." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ink-1000); padding: 30px; }
  .row { display: flex; gap: 30px; align-items: center; }
  .u { display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .dot { width: 64px; height: 64px; border-radius: 50%; background: var(--ink-800); border: 1px solid var(--border-ember); display:flex;align-items:center;justify-content:center; }
  .core { width: 16px; height: 16px; border-radius: 50%; background: var(--spark); }
  .u b { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .node { width: 14px; height: 14px; border-radius: 50%; background: var(--ember-400); }
</style>
</head>
<body>
  <div class="row">
    <div class="u"><div class="dot" style="box-shadow:var(--glow-sm)"></div><b>glow-sm</b></div>
    <div class="u"><div class="dot" style="box-shadow:var(--glow-md)"></div><b>glow-md</b></div>
    <div class="u"><div class="dot" style="box-shadow:var(--glow-lg)"></div><b>glow-lg</b></div>
    <div class="u"><div class="dot" style="box-shadow:var(--glow-spark-core)"><div class="core"></div></div><b>spark-core</b></div>
  </div>
</body>
</html>
