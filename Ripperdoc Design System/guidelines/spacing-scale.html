<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px base grid. Whitespace is a brand value." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 28px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .u { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: linear-gradient(180deg, var(--ember-400), var(--ember-600)); border-radius: var(--radius-xs); width: 100%; }
  .u span { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .u b { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="u" style="width:26px"><div class="bar" style="height:8px"></div><b>1</b><span>4</span></div>
    <div class="u" style="width:30px"><div class="bar" style="height:16px"></div><b>2</b><span>8</span></div>
    <div class="u" style="width:34px"><div class="bar" style="height:24px"></div><b>3</b><span>12</span></div>
    <div class="u" style="width:40px"><div class="bar" style="height:32px"></div><b>4</b><span>16</span></div>
    <div class="u" style="width:48px"><div class="bar" style="height:48px"></div><b>6</b><span>24</span></div>
    <div class="u" style="width:60px"><div class="bar" style="height:64px"></div><b>8</b><span>32</span></div>
    <div class="u" style="width:80px"><div class="bar" style="height:80px"></div><b>10</b><span>40</span></div>
    <div class="u" style="width:110px"><div class="bar" style="height:96px"></div><b>12</b><span>48</span></div>
  </div>
</body>
</html>
