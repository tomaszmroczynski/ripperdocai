<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-base); padding: 28px; }
  .row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); width: 100%; margin-bottom: 2px; }
  i[data-lucide] { width: 1em; height: 1em; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="text/babel">
    const { Button, IconButton, Badge, Avatar } = window.RipperdocDesignSystem_cbf3c1;
    const Ic = ({n}) => <i data-lucide={n}></i>;
    function Demo() {
      return (
        <div>
          <div className="lbl">Buttons</div>
          <div className="row">
            <Button variant="primary" iconLeft={<Ic n="zap"/>}>Augment</Button>
            <Button variant="secondary">Secondary</Button>
            <Button variant="outline">Outline</Button>
            <Button variant="ghost">Ghost</Button>
            <Button variant="primary" disabled>Disabled</Button>
          </div>
          <div className="row">
            <Button size="sm" variant="primary">Small</Button>
            <Button size="md" variant="primary">Medium</Button>
            <Button size="lg" variant="primary" iconRight={<Ic n="arrow-right"/>}>Large</Button>
            <IconButton label="Settings" variant="secondary"><Ic n="settings-2"/></IconButton>
            <IconButton label="Run" variant="primary"><Ic n="play"/></IconButton>
            <IconButton label="More" variant="ghost"><Ic n="more-horizontal"/></IconButton>
          </div>
          <div className="lbl">Badges</div>
          <div className="row">
            <Badge tone="ember" dot>Active</Badge>
            <Badge tone="up">+312%</Badge>
            <Badge tone="warn">Attention</Badge>
            <Badge tone="down" dot>Degraded</Badge>
            <Badge tone="info" variant="outline">Info</Badge>
            <Badge tone="neutral" variant="solid">v2.4</Badge>
          </div>
          <div className="lbl">Avatars</div>
          <div className="row">
            <Avatar name="Ada Lovelace" active />
            <Avatar name="Marcus Chen" />
            <Avatar name="Operator" size={52} active />
            <Avatar name="No Ring" ring={false} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
    setTimeout(() => window.lucide && lucide.createIcons(), 60);
  </script>
</body>
</html>
