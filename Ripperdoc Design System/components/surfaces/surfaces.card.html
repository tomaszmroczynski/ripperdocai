<html lang="en">
<head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Card } = window.RipperdocDesignSystem_cbf3c1;
    function Demo() {
      return (
        <div className="row">
          <Card>
            <div className="lbl">Default</div>
            <div className="h">Resting panel</div>
            <div className="p">Lit-from-within ink surface with a hairline edge and top sheen.</div>
          </Card>
          <Card interactive>
