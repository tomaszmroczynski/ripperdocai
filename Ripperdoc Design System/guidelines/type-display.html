<!-- @dsCard group="Type" viewport="700x250" name="Display — Geist" subtitle="Large, confident headlines. Tight tracking." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-base); padding: 32px; }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--text-accent); margin-bottom: 14px; }
  h1 { font-size: 64px; line-height: 1.02; letter-spacing: -0.03em; font-weight: 600; color: var(--text-strong); }
  h1 em { font-style: normal; background: var(--grad-ember); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .meta { margin-top: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); display: flex; gap: 18px; }
</style>
</head>
<body>
  <div class="eyebrow">Augmentation, not automation</div>
  <h1>We extend what<br>humans can <em>do</em>.</h1>
  <div class="meta"><span>Geist · 600</span><span>64px / 1.02</span><span>tracking −0.03em</span></div>
</body>
</html>
