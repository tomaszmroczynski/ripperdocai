<!-- @dsCard group="Type" viewport="700x180" name="The Lockup" subtitle="The signature wide-tracked uppercase line." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--ink-1000); padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .lockup { font-family: var(--font-display); font-weight: 300; font-size: 34px; letter-spacing: 0.30em; text-transform: uppercase; display: flex; align-items: center; gap: 0.5em; }
  .lockup .a { color: var(--mist-100); }
  .lockup .b { color: var(--mist-300); }
  .lockup .c { background: var(--grad-ember); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lockup .x { color: var(--ember-400); font-weight: 300; }
  .sub { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ember-300); }
</style>
</head>
<body>
  <div class="lockup"><span class="a">AI</span><span class="x">×</span><span class="b">SOFTWARE</span><span class="x">×</span><span class="c">HARDWARE</span></div>
  <div class="sub">We expand human capability</div>
</body>
</html>
